<!DOCTYPE html>
<html>
	<head>
		<title>Le JQuery</title>
		<meta charset='utf-8'>
		
		<link href="/appCours/vue/resources/données/JQcours17.css" rel="stylesheet" type="text/css">
		
	</head>
	<body>

		<h1>Cours <mark>JQUERY</mark></h1>
		<h2>Pierre Giraux Cours complet JQuey chapitre 17</h2>
		<h2>Créer des effets de fondu ou de slide</h2>

		<h3>Effet de fondu</h3>
		<div id='d01'>
			<p id='p1'>Un premier paragraphe.</p>
			<p id='p2'>Un second paragraphe.</p>			
		</div>				
		<div id='d02'>
			<button id='b1'>utiliser fadeOut</button>
			<button id='b2'>utiliser fadeIn</button>
			<button id='b3'>utiliser fadeToggle</button>
			<button id='b4'>utiliser fadeTo</button>
		</div>
		<div>
			<p class='pmes'> <span id='msg01'></span></p>
		</div>
		
		<h3>Effet de slide</h3>
		<div id='d03'>
			<p id='p3'>Un premier paragraphe.</p>
			<p id='p4'>Un second paragraphe.</p>			
		</div>				
		<div id='d04'>
			<button id='b5'>utiliser slideUp</button>
			<button id='b6'>utiliser slideDown</button>
			<button id='b7'>utiliser slideToggle</button>
		</div>
		<div>
			<p class='pmes'> <span id='msg02'></span></p>
		</div>

		<script src="/resources/themes/theme.monBog/js/jquery-3.7.1.js"></script>
		<script src="/appCours/vue/resources/données/JQcours17.js"></script>
	</body>
</html>
